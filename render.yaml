# FaceAttend — full stack on Render (one blueprint).
# Dashboard → New → Blueprint → connect palindrome-kasak/attendence

services:
  - type: web
    name: faceattend-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - frontend/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://faceattend-api.onrender.com

  - type: web
    name: faceattend-ai
    runtime: docker
    rootDir: ai-service
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    buildFilter:
      paths:
        - ai-service/**

  - type: web
    name: faceattend-api
    runtime: node
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run seed
    startCommand: npm start
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        fromService:
          name: faceattend-ai
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: UPLOAD_DIR
        value: uploads
      - key: FACE_MATCH_THRESHOLD
        value: "0.5"
      - key: MIN_FACE_CONFIDENCE
        value: "65"
      - key: FACE_AMBIGUITY_GAP
        value: "0.08"
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
